<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1D"/>
      <stop offset="100%" stop-color="#2a2a2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A1C"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle corner glow -->
  <radialGradient id="corner" cx="100%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#FF6A1C" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#FF6A1C" stop-opacity="0"/>
  </radialGradient>
  <rect width="64" height="64" rx="14" fill="url(#corner)"/>

  <!-- "V" letter: 3 points only — top-left → bottom-center → top-right -->
  <path
    d="M13 15 L32 49 L51 15"
    stroke="url(#orange)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>